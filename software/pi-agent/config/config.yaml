# Safe development defaults. The installer creates an appliance copy under /etc.
app:
  name: "FilamentTracker Live Spool"
  version: "0.1.0"
  environment: "development"
server:
  host: "0.0.0.0"
  port: 8001
  log_level: "info"
device:
  name: "Live Spool"
  location: ""
runtime:
  data_dir: "data"
hardware:
  device_mode: "mock"
scale:
  enabled: true
  backend: "mock"
  mock: true
  hx711:
    data_pin: 5
    clock_pin: 6
    gain: 128
    samples: 15
  nau7802:
    address: 0x2A
    channel: 1
    gain: 128
    poll_rate: 10
    samples: 15
    stable_stddev: 1000
nfc:
  enabled: true
  mock: true
  pn532:
    address: 0x24
admin:
  # These controls are intended only for a trusted local appliance.
  system_controls_enabled: false
