app:
  name: "FilamentTracker Live Spool"
  version: "0.1.0"
  environment: "development"

server:
  host: "127.0.0.1"
  port: 8001

device:
  name: "Live Spool"
  location: "Workshop"

hardware:
  device_mode: "real"

scale:
  enabled: true
  backend: "nau7802"
  mock: false
  unit: "grams"
  hx711:
    data_pin: 5
    clock_pin: 6
    gain: 128
    samples: 15
  nau7802:
    address: 0x2A
    channel: 1
    gain: 128
    poll_rate: 10
    samples: 15
    stable_stddev: 1000

nfc:
  enabled: true
  mock: false
