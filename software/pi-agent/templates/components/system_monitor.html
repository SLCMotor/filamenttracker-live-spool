<aside class="settings-monitor" data-system-monitor>
  <div class="settings-monitor-header">
    <div>
      <div class="section-kicker">System Monitor</div>
      <h2>Live Status</h2>
    </div>
    <div id="monitorApiDot" class="monitor-dot"></div>
  </div>

  <div class="monitor-list">

    <div class="monitor-row">
      <span>API</span>
      <strong id="monitorApi">Checking...</strong>
    </div>

    <div class="monitor-row">
      <span>Scale</span>
      <strong id="monitorScale">Checking...</strong>
    </div>

    <div class="monitor-row">
      <span>Live Weight</span>
      <strong id="monitorWeight">-- g</strong>
    </div>

    <div class="monitor-row">
      <span>NFC</span>
      <strong id="monitorNfc">Checking...</strong>
    </div>

    <div class="monitor-row">
      <span>Current Spool</span>
      <strong id="monitorSpool">None</strong>
    </div>

  </div>
</aside>
