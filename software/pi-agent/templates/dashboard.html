<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
  <div class="screen">
    <header class="header">
      <div>
        <div class="brand-main">Filament Tracker</div>
        <div class="brand-sub">Live Spool</div>
      </div>

      <div class="header-right">
        <div class="device-name">{{ device_name }} · v{{ version }}</div>
        <div class="pill" id="lastUpdated">Starting...</div>
      </div>
    </header>

    <main class="main">
      <section class="card weight-card">
        <div class="weight-label">Current Spool Weight</div>

        <div class="spool-stage">
          <canvas id="spoolGauge" width="390" height="285"></canvas>

          <div class="weight-readout">
            <div class="weight">
              <span id="weight">--</span><span class="grams">g</span>
            </div>
            <div class="weight-subline">Live scale reading</div>
          </div>
        </div>
      </section>

      <section class="card spool-card">
        <div class="section-kicker">Current Spool</div>

        <div class="product-hero">
          <div class="product-copy">
            <div class="spool-name" id="spoolName">No spool loaded</div>
            <div class="spool-subtitle" id="spoolSubtitle">Waiting for NFC tag...</div>
            <div class="brand-badge" id="brandBadge">--</div>
          </div>
          <div class="color-swatch" id="colorSwatch" title="Filament color"></div>
        </div>

        <div class="detail-grid">
          <div class="detail-tile">
            <div class="detail-icon">▱</div>
            <div class="detail-copy">
              <div class="label">Material</div>
              <div class="value" id="material">--</div>
            </div>
          </div>

          <div class="detail-tile">
            <div class="detail-icon">◌</div>
            <div class="detail-copy">
              <div class="label">Color</div>
              <div class="value" id="color">--</div>
            </div>
          </div>

          <div class="detail-tile">
            <div class="detail-icon">◇</div>
            <div class="detail-copy">
              <div class="label">Tag ID</div>
              <div class="value mono" id="tagId">--</div>
            </div>
          </div>

          <div class="detail-tile">
            <div class="detail-icon">↻</div>
            <div class="detail-copy">
              <div class="label">Changed</div>
              <div class="value" id="changed">--</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-card">
        <div class="footer-icon">●</div>
        <div>
          <div class="footer-label">API</div>
          <div class="footer-value good">ONLINE</div>
        </div>
      </div>

      <div class="footer-card">
        <div class="footer-icon">◆</div>
        <div>
          <div class="footer-label">NFC</div>
          <div class="footer-value" id="nfcFooter">--</div>
        </div>
      </div>

      <div class="footer-card">
        <div class="footer-icon">◉</div>
        <div>
          <div class="footer-label">Scale</div>
          <div class="footer-value" id="scaleFooter">--</div>
        </div>
      </div>

      <div class="footer-card">
        <div class="footer-icon">↻</div>
        <div>
          <div class="footer-label">Monitor</div>
          <div class="footer-value" id="monitorStatus">--</div>
        </div>
      </div>
    </footer>
  </div>

  <script src="/static/js/spool-gauge.js"></script>
  <script src="/static/js/status-panel.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
